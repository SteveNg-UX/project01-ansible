---
- name: update redhat
  hosts: all
  ansible.builtin.apt:
    name: "*"
    state: latest
  when: ansible_os_family == "Debian"

- name: update debian
  hosts: all
  ansible.builtin.rpm:
    name: "*"
    state: latest
  when: ansible_os_family == "RedHat"

- name: deploy web service
  hosts: [srv_web_prod, srv_web_dev]
  roles:
    - web_role

- name: deploy database service
  hosts: [srv_db_prod, srv_db_dev]
  roles:
    - db_role