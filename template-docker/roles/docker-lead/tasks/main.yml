---
- name: Update
  tasks:
    - name: upgrade apt packages debian
      ansible.builtin.apt:
        upgrade: full
      when: ansible_os_family == "Debian"

    - name: Upgrade packages redhat
      ansible.builtin.dnf:
        name: "*"
        state: latest
      when: ansible_os_family == "RedHat"



- name: Install docker dependencie
  tasks:
    - name: Install docker dependencies debian
      ansible.builtin.apt:
        name: "{{ item }}"
        state: present
      loop:
        - apt-transport-https
        - ca-certificates
        - curl
        - gnupg-agent
        - software-properties-common
      when: ansible_os_family == "Debian"

    - name: Install docker dependencies redhat
      ansible.builtin.dnf:
        name: "{{ iten }}"
        state: present
      loop:
        - dnf-plugins-core
        - device-mapper-persistent-data
        - lvm2
      when: ansible_os_family == "RedHat"



- name: Add docker repository
  tasks:
    - name: Add Docker's official GPG key debian
      ansible.builtin.apt_key:
        url: https://download.docker.com/linux/$(lsb_release -is | tr '[:upper:]' '[:lower:]')/gpg
        state: present
      when: ansible_os_family == "Debian"

    - name: Add Docker repository debian
      ansible.builtin.apt_repository:
        repo: "deb [arch=amd64] https://download.docker.com/linux/$(lsb_release -is | tr '[:upper:]' '[:lower:]') $(lsb_release -cs) stable"
        state: present
      when: ansible_os_family == "Debian"

    - name: Update apt debian
      ansible.builtin.apt:
        update_cache: yes
      when: ansible_os_family == "Debian"

    - name: Add docker repository redhat
      ansible.builtin.dnf_repository:
        name: docker
        baseurl: https://download.docker.com/linux/rhel/docker-ce.repo
        enabled: yes
        gpgcheck: yes
        gpgkey: https://download.docker.com/linux/rhel/gpg
      when: ansible_os_family == "RedHat"



- name: Install docker engine
  tasks:
    - name: Install docker engine debian
      ansible.builtin.apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present
      when: ansible_os_family == "Debian"
 
    - name: Install docker engine redhat
      ansible.builtin.dnf:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present
      when: ansible_os_family == "RedHat"



- name: Configure docker
  tasks:
    - name: Start and enable docker service
      ansible.builtin.service:
        name: docker
        state: started
        enabled: yes

    - name: Add user to docker group
      ansible.builtin.user:
        name: {{ ansible_user }}
        groups: docker
        append: yes

    - name: Reset ssh connection to apply new docker group membership
      ansible.builtin.meta: reset_connection



- name: Configure cluster docker swarm
  tasks:
    - name: Configure node docker leader
      ansible.builtin.command: docker swarm init --advertise-addr $(hostname -i) | grep "docker swarm join-token worker" > /tmp/worker_join_cmd.sh
      args:
        creates: /tmp/worker_join_cmd.sh
    
    - name: Fetch token from node leader to orchestrator
      ansible.builtin.fetch:
        src: "/tmp/worker_join_cmd.sh"
        dest: "/tmp/worker_join_cmd.sh"
        flat: true
      run_once: true